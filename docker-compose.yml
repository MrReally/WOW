# SEVER App — full stack in one command.
#
#   docker compose up --build      → whole app at http://localhost:8080
#   docker compose up -d db        → just Postgres (for `pnpm dev`)
#
# Schema-per-module keeps each module's tables isolated inside one Postgres now;
# any module can later move to its own service + database without changing
# callers (see README "Splitting a module into a service").
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sever
      POSTGRES_PASSWORD: sever
      POSTGRES_DB: sever
    ports:
      - "5432:5432"
    volumes:
      - sever_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sever -d sever"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sever:sever@db:5432/sever
      PORT: "4000"
      # First boot loads demo data (incl. owner@sever.local / owner123).
      SEED_ON_START: "true"
      # Show the real login screen. Demo logins:
      #   owner@sever.local / owner123        (Владелец — все права)
      #   warehouse@sever.local / whse123      (Склад)
      #   tech@sever.local / tech123           (Монтажник)
      # Set true only for frictionless local dev (auto-logs in as the owner).
      AUTH_DEV_BYPASS: "false"
      # Telegram bot token (from @BotFather). Passed from the host env — never
      # commit it. Run like: TELEGRAM_BOT_TOKEN=123:abc docker compose up --build
      # With it set, notifications also deliver to Telegram and the bot links
      # accounts (Settings → Люди → «Привязать Telegram»).
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
    ports:
      - "8080:4000"

volumes:
  sever_pgdata:
